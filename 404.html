<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Bir Bikram Dey</title>
  <meta http-equiv="refresh" content="2; url=/index.html" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Sora", sans-serif;
      background: linear-gradient(120deg, #f2f5fb 0%, #f8fbff 100%);
      color: #121c33;
    }

    main {
      width: min(100% - 2rem, 42rem);
      padding: 2rem;
      border: 1px solid #d7dff0;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 32px rgba(18, 28, 51, 0.09);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0.5rem 0;
      color: #55627c;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      border: 1px solid #d7dff0;
      background: #ffffff;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>The page you requested does not exist or has moved.</p>
    <p>You will be redirected to the homepage shortly.</p>
    <a href="/index.html">Go to homepage</a>
  </main>
</body>
</html>
